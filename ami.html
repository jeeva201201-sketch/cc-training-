<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>dropdown</title>
	<style>
     
	div
	{
		background-color: grey;
		margin: 0;
		height: 50px;
		padding: 2px;
		
	}
	h1
	{
		line-height: 50px;
		text-align: left;
		display: inline;
	}
	ul
	{ 
		display:inline-block;
		height: 2px;
		padding-top: 0;
		/padding-right: 20px;/
		text-align: right;
		float: right;
	}
	ul li
	{   
		height: 20px;
		float: center;
		list-style-type: none;
		display: inline-block;
	}
	ul li a
	{  
		font-size: 20px;
		font-weight: bold;
		text-align: right;
		padding-top: 18px;
		padding-right: 20px;
		padding-left: 20px;
		padding-bottom: 15px;

	}
    .dropdown li a:hover
	{
		color: white;
		background-color: lightgray;
	}
	</style>
</head>
<body>
<div id="e1">
<h1>Amazon</h1>
<ul class="dropdown">
	<li><a>Open</a></li>
	<li><a>Save</a></li>
	<li><a>View</a></li>
	<li><a>Run</a></li>
</ul>
</div>
</body>
</html>

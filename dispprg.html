<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">

	<title>Display</title>
	<style type="text/css">
	#d1
	{
		border: 2px solid red;
		width: 200px;
		height: 200px;
		background: green;
		display: flex;
	}	
	#d2
	{
		border: 2px solid red;
		width: 200px;
		height: 200px;
		background: yellow;
		display:  flex;
	}
	#im1
	{
		border: 2px solid red;
		width: 200px;
		height: 200px;
		background: yellow;
		display: flex;
		visibility: hidden;
	}
	#im2
	{
		border: 2px solid red;
		width: 200px;
		height: 200px;
		background: yellow;
		display:flex;



	}

	</style>
</head>
<body>
<div id="d1">
   <h1>First Div</h1>
</div>
<div id="d2">
   <h1>second  Div</h1>
</div>
<img id="im1" src="pic1.jpg" alt="pic1.png">
<img id="im2" src="pic2.jpg" alt="pic2.png">

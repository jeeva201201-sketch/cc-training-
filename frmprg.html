<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Form Control Prgoram</title>
</head>
<body>
<form action="welcome.html" method="get" name="frm1" autocomplete="off">

<table border="1" width="500">
<caption><h1>Welcome to Shivashri Academy Page...!</h1></caption>

<tr>
	<th><label>User Name :</label></th>
	<td><input type="text" name="txt1" placeholder="User Name" minlength="3" maxlength="10"></td>
</tr>

<tr>
	<th><label>Password :</label></th>
	<td><input type="password" name="pwd1" placeholder="Password"></td>
</tr>

<tr>
	<th><label>Age :</label></th>
	<td><input type="number" name="age" min="18" max="80"></td>
</tr>


<tr><td><input type="submit" name="s1" value="Click Main Page"></td>
	<td><button>Click to Page</button></td>
</tr>
<tr>
	<td><input type="image" name="img" src="pic1.png" width="80" height="30">
	</td>
	<td><button type="submit"><img src="pic2.png" width="80" height="40" alt="pic2.png">	
	</button></td>
</tr>
<tr><td><input type="reset" name="res" value="Clear"></td>
	<td><button type="reset" name="res1">Reset Button</td>
</tr>
</table>	
</form>
</body>
</html>

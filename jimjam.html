	<script>
function markCalc()
{
var t,e,m,s,h,tot,avg;
t=document.forms['frm']['t3'].value;
e=document.forms['frm']['t4'].value;
m=document.forms['frm']['t5'].value;
s=document.forms['frm']['t6'].value;
h=document.forms['frm']['t7'].value;
tot=parseInt(t)+parseInt(e)+parseInt(m)+parseInt(s)+parseInt(h);
avg=tot/5;
document.forms['frm']['t8'].value=tot;
document.forms['frm']['t9'].value=avg;
if(tot>=250)
	{
		document.forms['frm']['t10'].value='Pass';
	}
else
{
	document.forms['frm']['t10'].value='Fail';
}
return;
}

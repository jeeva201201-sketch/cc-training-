<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>js5</title>
</head>
<body>
<script>
let name = prompt("Enter your name:");


function Pyramid(str) {
    let n = str.length;
    for (let i = 1; i <= n; i++)
     {
        document.write(str.substring(0, i));
        console.log(str.substring(0, i));
    }
    let n = str.length;
    for (let i = n - 1; i >= 1; i--) 
    {
        document.write(str.substring(0, i));
        console.log(str.substring(0, i));
    }
}


Pyramid(name);


</script>

</body>
</html>

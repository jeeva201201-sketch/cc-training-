<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Layout Program</title>
	<style type="text/css">
	body
	{
		margin: 0px;
	}	
	header
	{
		margin: 0px;
		width: 100%;
		height: 100px;
		background: green;
	}	
	h1
	{
		margin: 0px;
		text-align: center;
		color: wheat;
		line-height: 90px;
	}
	nav
	{
		height: 400px;
		width: 10%;
		background: lightgreen;
		float: left;

	}
	main
	{
		width: 75%;
		height: 400px;
		background: lightgray;
		float: left;
	}
	aside
	{
		width: 15%;
		height: 400px;
		background: lightpink;
		float: left;
	}
	footer
	{
		width: 100%;
		height: 100px;
		background: green;
		line-height: 90px;
		clear: left;
	}
	</style>
</head>
<body>
<header><h1>Shivashri Academy</h1></header>
<nav>Home About</nav>
<main>Main </main>
<aside>Aside</aside>
<footer><h1>Cherry Road,Hasthampatty</h1></footer>
</body>
</html>

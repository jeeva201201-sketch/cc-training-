<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Selector Example</title>
	<style type="text/css">
	header h1
	{
		color: red;
	}	
	header>h1
	{
		color: green;
	}
	</style>
</head>
<body>
<h1>Heading 1</h1>
<header>
<h1>Header Heading</h1>	

<section>
<h1>Section Heading</h1>	
</section>

</header>
</body>
</html>

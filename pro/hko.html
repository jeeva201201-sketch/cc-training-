    /**
     * Initializes the default symptom chips in the UI.
     */
    function initializeSymptomChips() {
        defaultSymptomList.forEach(symptom => {
            chipsContainer.appendChild(createChipElement(symptom));
        });
    }

    /**
     * Creates a clickable symptom chip HTML element.
     * @param {string} symptomText The text for the chip.
     * @returns {HTMLElement} The button element for the chip.
     */
    function createChipElement(symptomText) {
        const chip = document.createElement('button');
        const formattedSymptom = symptomText.trim().toLowerCase();
        
        // Tailwind classes for a standard, unselected chip
        chip.className = 'symptom-chip px-3 py-1 text-sm rounded-full border border-gray-300 bg-white text-gray-700 hover:bg-indigo-50 transition duration-150 ease-in-out';
        chip.textContent = symptomText.trim();
        chip.setAttribute('data-symptom', formattedSymptom);

        // Click handler
        chip.addEventListener('click', () => {
            toggleSymptom(chip, formattedSymptom);
        });

        return chip;
    }

    /**
     * Toggles a symptom's selection state.
     * @param {HTMLElement} chipElement The chip element being clicked.
     * @param {string} symptom The symptom keyword.
     */
    function toggleSymptom(chipElement, symptom) {
        const index = selectedSymptoms.indexOf(symptom);

        if (index === -1) {
            // Select the symptom
            selectedSymptoms.push(symptom);
            // Apply selected styling (Tailwind classes)
            chipElement.classList.remove('bg-white', 'text-gray-700', 'hover:bg-indigo-50');
            chipElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow');
        } else {
            // Deselect the symptom
            selectedSymptoms.splice(index, 1);
            // Revert to unselected styling
            chipElement.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600', 'shadow');
            chipElement.classList.add('bg-white', 'text-gray-700', 'hover:bg-indigo-50');
        }
    }

     * Handles adding a custom symptom from the input field.
     */
    document.getElementById('add-custom-symptom-btn').addEventListener('click', () => {

        if (customSymptom && !selectedSymptoms.includes(customSymptom.toLowerCase())) {
            const newChip = createChipElement(customSymptom);
            chipsContainer.appendChild(newChip);
            // Automatically select the new chip
            toggleSymptom(newChip, customSymptom.toLowerCase());
            customInput.value = ''; // Clear input
        }
    });

    /**
     * Main event handler for the Analyze button.
     */
    document.getElementById('analyze-symptoms-btn').addEventListener('click', () => {
        resultsSection.innerHTML = ''; // Clear old results
        resultsTitle.classList.add('hidden');
        noSymptomsMessage.classList.add('hidden');

        if (selectedSymptoms.length === 0) {
            noSymptomsMessage.classList.remove('hidden');
            return;
        }

        const predictions = analyzeSymptoms(selectedSymptoms);
        displayResults(predictions);
    });

    // --- 4. CORE OFFLINE ANALYSIS LOGIC ---

    /**
     * Compares user symptoms with the disease dataset to find matches.
     * @param {string[]} symptoms The list of selected/typed symptoms.
     * @returns {Object[]} An array of disease objects with an added matchScore.
     */
    function analyzeSymptoms(symptoms) {
        const userSymptoms = new Set(symptoms);
        let predictionList = [];

        diseaseData.forEach(disease => {
            let matchCount = 0;
            // A simple count of how many user symptoms match the disease's known symptoms
            disease.symptoms.forEach(diseaseSymptom => {
                if (userSymptoms.has(diseaseSymptom)) {
                    matchCount++;
                }
            });

            // Calculate match score (percentage of known symptoms for that disease)
            const maxScore = disease.symptoms.length;
            let matchScore = 0;
            if (maxScore > 0) {
                // Score based on how many of the disease's symptoms were matched by the user
                matchScore = (matchCount / maxScore) * 100;
            } else {
                // Handle case of disease with no symptoms listed
                matchScore = 0;
            }
            
            // Add a high bonus if the user's symptoms perfectly match a subset of the disease's symptoms
            // This prioritizes a 100% match over a high-count, low-percentage match
            if (matchCount > 0 && matchScore === 100) {
                matchScore += 10; // Simple bonus for a perfect match of all listed symptoms
            }
            
            // Only add diseases with at least one match
            if (matchCount > 0) {
                predictionList.push({
                    ...disease,
                    matchCount: matchCount,
                    matchScore: Math.min(100, matchScore) // Ensure score doesn't exceed 100 after bonus
                });
            }
        });

        // Sort by match score (highest first), then by match count (more matches is better)
        predictionList.sort((a, b) => {
            if (b.matchScore !== a.matchScore) {
                return b.matchScore - a.matchScore;
            }
            return b.matchCount - a.matchCount;
        });

        // Return only the top 3 results
        return predictionList.slice(0, 3);
    }

    /**
     * Displays the results as a series of cards.
     * @param {Object[]} predictions The top 3 predicted diseases.
     */
    function displayResults(predictions) {
        if (predictions.length > 0) {
            resultsTitle.classList.remove('hidden');
            predictions.forEach(disease => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 mb-4 rounded-lg shadow-xl border-t-4 border-indigo-500 transition duration-300 hover:shadow-2xl';

                card.innerHTML = `
                    <h4 class="text-xl font-bold text-indigo-700 mb-2">${disease.name}</h4>
                    <p class="text-sm font-semibold mb-3">Match Confidence: <span class="text-red-600 text-lg">${disease.matchScore.toFixed(0)}%</span></p>

                    <div class="space-y-3 text-gray-700">
                        <div class="border-l-4 border-yellow-400 pl-3">
                            <p class="font-bold text-sm uppercase">Matching Symptoms</p>
                            <p class="text-sm italic">${selectedSymptoms.filter(s => disease.symptoms.includes(s)).map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(', ')}</p>
                        </div>
                        <div class="border-l-4 border-green-400 pl-3">
                            <p class="font-bold text-sm uppercase">Prevention</p>
                            <p class="text-sm">${disease.prevention}</p>
                        </div>
                        <div class="border-l-4 border-blue-400 pl-3">
                            <p class="font-bold text-sm uppercase">Common Medicines</p>
                            <p class="text-sm">${disease.medicines}</p>
                        </div>
                        <div class="border-l-4 border-red-400 pl-3">
                            <p class="font-bold text-sm uppercase">Causes</p>
                            <p class="text-sm">${disease.causes}</p>
                        </div>
                    </div>
                `;
                resultsSection.appendChild(card);
            });
        } else {
            resultsTitle.classList.remove('hidden');
            resultsSection.innerHTML = '<p class="text-center text-gray-500 p-4 bg-yellow-50 rounded-lg">No significant disease matches found for the selected symptoms. Please try adding more specific symptoms.</p>';
        }
    }

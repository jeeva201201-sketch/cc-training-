<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Element</title>
	<style type="text/css">
	p:first-child
	{
		color: red;
	}	
	p:last-child
	{
		background-color: pink;
	}
	p:only-child
	{
		text-decoration: underline;
	}
	</style>
</head>
<body>
<header>
<h1>Heading</h1>	
<p>Header Para 1</p>
<p>Header Para 2</p>
</header>
<section>
<p>Section Para</p>	
</section>
</body>
</html>

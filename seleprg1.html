<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Selector Element</title>
	<style type="text/css">
	p+p
	{
		color: green;
	}
	h1~p
	{
		color: red;
	}	
	</style>
	
</head>
<body>
<h1>Heading 1</h1>
<header>
<p>Header Para 1</p>
<h1>Heading 2</h1>
<p>Para 2</p>
<p>Para 3</p>
<a href="#">Link</a>
<p>Para 4</p>	
</header>
</body>
</html>

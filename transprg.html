<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Transition</title>
	<style type="text/css">
	img
	{
		height: 100px;
		width: 100px;
		transition-duration: 3s;
		transition-delay: 1.5s;
		transition-property: height;
	}	
	img:hover
	{
		width: 300px;
		height: 500px;
	}
	</style>
</head>
<body>
<img src="pic2.png" alt="pic2.png">
</body>
</html>
